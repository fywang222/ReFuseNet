experiment:
  name: cityscapes_fcn_resnet50
  output_dir: outputs/cityscapes_fcn_resnet50
  seed: 42

dataset:
  name: cityscapes
  root: data/Cityscapes
  num_classes: 19
  ignore_index: 255
  train_split: train
  val_split: val
  test_split: val
  train_list: null
  val_list: null
  test_list: null
  crop_size: [1024, 1024]
  random_resize:
    scale: [2048, 1024]
    ratio_range: [0.5, 2.0]
    keep_ratio: true
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

model:
  name: fcn_resnet50
  num_classes: 19
  pretrained: true

train:
  epochs: 100
  batch_size: 2
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.0001
  amp: true
  crop_size: [1024, 1024]

  log_every_steps: 10
  eval_every: 5
  save_every: 5

eval:
  batch_size: 1
  inference: sliding
  sliding_crop_size: [1024, 1024]
  sliding_stride: [768, 768]
  save_predictions: true
