experiment:
  name: cityscapes_sam_vitl
  output_dir: outputs/cityscapes_sam_vitl
  seed: 42

dataset:
  name: cityscapes
  root: /path/to/Cityscapes
  num_classes: 19
  ignore_index: 255
  train_split: train
  val_split: val
  test_split: test
  train_list: null
  val_list: null
  test_list: null
  crop_size: [512, 1024]
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

model:
  name: sam_vitl_decoder
  num_classes: 19
  checkpoint: /path/to/sam_vit_l.pth
  freeze_encoder: true

train:
  epochs: 80
  batch_size: 1
  num_workers: 2
  lr: 0.00005
  weight_decay: 0.0001
  amp: true
  crop_size: [512, 1024]

eval:
  batch_size: 1
  save_predictions: true
