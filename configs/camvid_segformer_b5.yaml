experiment:
  name: camvid_segformer_b5
  output_dir: outputs/camvid_segformer_b5
  seed: 42

dataset:
  name: camvid
  root: data/CamVid
  num_classes: 11
  ignore_index: 255
  train_split: train
  val_split: test
  test_split: test
  train_list: null
  val_list: null
  test_list: null
  crop_size: [360, 480]
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

model:
  name: segformer_b5
  num_classes: 11
  pretrained: true
  checkpoint: /data/xicheng/ReFuseNet/checkpoints/nvidia_mit-b5

train:
  epochs: 80
  batch_size: 8
  num_workers: 8
  lr: 0.00006
  weight_decay: 0.01
  amp: true
  crop_size: [360, 480]

  log_every_steps: 10
  eval_every: 10
  save_every: 10

eval:
  batch_size: 4
  inference: whole
  save_predictions: true
