experiment:
  name: cityscapes_refusenet_t1_segmenter
  output_dir: outputs/cityscapes_refusenet_t1_segmenter
  seed: 42
dataset:
  name: cityscapes
  root: data/Cityscapes
  num_classes: 19
  ignore_index: 255
  label_format: trainIds
  train_split: train
  val_split: val
  test_split: val
  train_list: null
  val_list: null
  test_list: null
  crop_size:
  - 1024
  - 1024
  random_resize:
    scale:
    - 2048
    - 1024
    ratio_range:
    - 0.5
    - 2.0
    keep_ratio: true
  mean:
  - 0.485
  - 0.456
  - 0.406
  std:
  - 0.229
  - 0.224
  - 0.225
model:
  name: ReFuseNet
  setting: T1
  sam:
    model_type: vit_b
    checkpoint: checkpoints/sam_vit_b_01ec64.pth
    train_mode: low_lr_ft
  decoder:
    num_classes: 19
    head_channels: 64
    head_resolution:
    - 256
    - 256
    feature_mode: transformer
    fusion_mode: segmenter
    transformer_dim: 256
    transformer_depth: 4
    transformer_heads: 8
    transformer_mlp_dim: 1024
    transformer_dropout: 0.0
    transformer_token_resolution:
    - 64
    - 64
train:
  epochs: 50
  batch_size: 2
  grad_accum_steps: 4
  num_workers: 8
  lr_decoder: 0.0001
  lr_sam: 1.0e-05
  weight_decay: 0.0001
  amp: true
  log_every_steps: 10
  eval_every: 5
  save_every: 50
  scheduler:
    type: poly
    power: 1.0
    warmup_iters: 1500
    warmup_ratio: 1.0e-06
    min_factor: 0.0
eval:
  batch_size: 1
  inference: sliding
  sliding_crop_size:
  - 1024
  - 1024
  sliding_stride:
  - 768
  - 768
  save_predictions: true
