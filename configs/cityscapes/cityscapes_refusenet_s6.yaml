experiment:
  name: cityscapes_refusenet_s6_s2_boundary
  output_dir: outputs/cityscapes_refusenet_s6_s2_boundary
  seed: 42
dataset:
  name: cityscapes
  root: data/Cityscapes
  num_classes: 19
  ignore_index: 255
  label_format: trainIds
  train_split: train
  val_split: val
  test_split: val
  train_list: null
  val_list: null
  test_list: null
  crop_size:
  - 1024
  - 1024
  random_resize:
    scale:
    - 2048
    - 1024
    ratio_range:
    - 0.5
    - 2.0
    keep_ratio: true
  mean:
  - 0.485
  - 0.456
  - 0.406
  std:
  - 0.229
  - 0.224
  - 0.225
model:
  name: ReFuseNet
  setting: S6
  sam:
    model_type: vit_b
    checkpoint: checkpoints/sam_vit_b_01ec64.pth
    train_mode: low_lr_ft
  decoder:
    num_classes: 19
    dim: 128
    head_channels: 64
    head_resolution:
    - 256
    - 256
    pseudo_scales:
    - 4
    - 8
    - 16
    - 32
    feature_mode: pseudo_pyramid
    fusion_mode: multiscale
  boundary:
    enabled: true
train:
  epochs: 50
  batch_size: 2
  num_workers: 8
  lr_decoder: 0.0001
  lr_sam: 1.0e-05
  weight_decay: 0.0001
  amp: true
  lambda_boundary: 1.0
  log_every_steps: 10
  eval_every: 5
  save_every: 50
  scheduler:
    type: poly
    power: 1.0
    warmup_iters: 1500
    warmup_ratio: 1.0e-06
    min_factor: 0.0
  grad_accum_steps: 4
eval:
  batch_size: 1
  inference: sliding
  sliding_crop_size:
  - 1024
  - 1024
  sliding_stride:
  - 768
  - 768
  save_predictions: true
