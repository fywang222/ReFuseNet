experiment:
  name: camvid_fcn_resnet50_cityscapes_pretrained_20epoch
  output_dir: outputs/camvid_fcn_resnet50_cityscapes_pretrained_20epoch
  seed: 42
dataset:
  name: camvid
  root: data/CamVid
  num_classes: 11
  ignore_index: 255
  train_split: train
  val_split: test
  test_split: test
  train_list: null
  val_list: null
  test_list: null
  crop_size:
  - 360
  - 480
  mean:
  - 0.485
  - 0.456
  - 0.406
  std:
  - 0.229
  - 0.224
  - 0.225
model:
  name: fcn_resnet50
  num_classes: 11
  pretrained: true
train:
  epochs: 20
  batch_size: 8
  grad_accum_steps: 1
  num_workers: 8
  lr: 0.0001
  weight_decay: 0.0001
  amp: true
  crop_size:
  - 360
  - 480
  log_every_steps: 10
  eval_every: 10
  save_every: 20
  scheduler:
    type: poly
    power: 1.0
    warmup_iters: 500
    warmup_ratio: 1.0e-06
    min_factor: 0.0
eval:
  batch_size: 4
  inference: whole
  save_predictions: true
