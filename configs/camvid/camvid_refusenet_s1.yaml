experiment:
  name: camvid_refusenet_s1
  output_dir: outputs/camvid_refusenet_s1
  seed: 42

dataset:
  name: camvid
  root: data/CamVid
  num_classes: 11
  ignore_index: 255
  train_split: train
  val_split: test
  test_split: test
  train_list: null
  val_list: null
  test_list: null
  crop_size: [360, 480]
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

model:
  name: ReFuseNet
  setting: S1
  sam:
    model_type: vit_b
    checkpoint: ${SAM_VIT_B_CHECKPOINT}
  decoder:
    num_classes: 11
    dim: 128

train:
  epochs: 80
  batch_size: 8
  grad_accum_steps: 1
  num_workers: 8
  lr_decoder: 1.0e-4
  lr_sam: 1.0e-5
  weight_decay: 0.0001
  amp: true
  crop_size: [360, 480]

  log_every_steps: 10
  eval_every: 10
  save_every: 10

eval:
  batch_size: 4
  inference: whole
  save_predictions: true
