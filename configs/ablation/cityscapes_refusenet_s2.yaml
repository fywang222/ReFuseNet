experiment:
  name: cityscapes_refusenet_s2
  output_dir: outputs/cityscapes_refusenet_s2
  seed: 42

dataset:
  name: cityscapes
  root: /path/to/Cityscapes
  num_classes: 19
  ignore_index: 255
  train_split: train
  val_split: val
  test_split: test
  train_list: null
  val_list: null
  test_list: null
  crop_size: [512, 1024]
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

model:
  name: ReFuseNet
  setting: S2
  sam:
    model_type: vit_b
    checkpoint: /path/to/sam_vit_b.pth
  decoder:
    num_classes: 19
    dim: 128
    pseudo_scales: [4, 8, 16, 32]

train:
  epochs: 80
  batch_size: 1
  num_workers: 2
  lr_decoder: 1.0e-4
  lr_sam: 1.0e-5
  weight_decay: 0.0001
  amp: true

eval:
  batch_size: 1
  save_predictions: true

