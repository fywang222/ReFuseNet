experiment:
  name: cityscapes_refusenet_s5_dpt_refine
  output_dir: outputs/cityscapes_refusenet_s5_dpt_refine
  seed: 42

dataset:
  name: cityscapes
  root: data/Cityscapes
  num_classes: 19
  ignore_index: 255
  train_split: train
  val_split: val
  test_split: test
  train_list: null
  val_list: null
  test_list: null
  crop_size: [1024, 1024]
  random_resize:
    scale: [2048, 1024]
    ratio_range: [0.5, 2.0]
    keep_ratio: true
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

model:
  name: ReFuseNet
  setting: S5
  sam:
    model_type: vit_b
    checkpoint: ${SAM_VIT_B_CHECKPOINT}
    train_mode: low_lr_ft
    intermediate_blocks: [3, 6, 9, 12]
  decoder:
    num_classes: 19
    dim: 128
    feature_mode: multi_level
    fusion_mode: dpt
    reassembly_channels: [96, 192, 384, 768]
  refine:
    enabled: true
    type: gru
    iters: 3

train:
  epochs: 80
  batch_size: 1
  num_workers: 2
  lr_decoder: 1.0e-4
  lr_sam: 1.0e-5
  weight_decay: 0.0001
  amp: true
  lambda_aux: 0.4

eval:
  batch_size: 1
  inference: sliding
  sliding_crop_size: [1024, 1024]
  sliding_stride: [768, 768]
  save_predictions: true
